---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build (macOS)
        run: swift build --build-tests -v
      - name: Test (macOS)
        run: swift test -v --skip-build

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Build (iOS)
        run: xcodebuild -scheme SwiftMCP -destination 'generic/platform=iOS' build

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build (Linux)
        run: swift build --build-tests -v
      - name: Test (Linux)
        run: swift test -v --skip-build

  # Non-blocking: swift-nio (NIOPosix) does not currently compile on Windows
  # (IPPROTO / Sendable errors in System.swift, Thread.swift, ThreadWindows.swift).
  # This is an upstream issue, not in SwiftMCP. Kept in CI so the job starts
  # passing automatically once swift-nio gains Windows support; flip to required
  # then. See https://github.com/apple/swift-nio for Windows status.
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Build (Windows)
        run: swift build --build-tests -v
      - name: Test (Windows)
        run: swift test -v --skip-build

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Build & test (Android emulator)
        uses: skiptools/swift-android-action@v2
        with:
          swift-version: "6.3.2"
          free-disk-space: true
