---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      # No Xcode pin: macos-latest's default toolchain (Swift 6.1) must be able
      # to build SwiftMCP, which is what keeps the package 6.1-compatible now
      # that the SwiftCross dependency is also swift-tools-version 6.1.
      - name: Verify Swift version
        run: swift --version
      - name: Build (macOS)
        run: swift build --build-tests -v
      - name: Test (macOS)
        run: swift test -v --skip-build

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      # Xcode 16+ ships platform SDKs as on-demand components, so a freshly
      # rotated `macos-latest` image can have Xcode 26.0 without the iOS
      # platform installed — `-destination 'generic/platform=iOS'` then resolves
      # to zero destinations ("iOS 26.0 is not installed") before anything
      # compiles. Fetch the component when it is missing. This is best-effort
      # (`|| true`): on images that already have the platform the download itself
      # can error ("Unable to connect to simulator"), and the Build step below is
      # the real gate either way — it only needs the SDK, which is present once
      # this has run (or was already there).
      - name: Ensure the iOS platform is installed (best-effort)
        run: xcodebuild -downloadPlatform iOS || true
      - name: Build (iOS)
        run: xcodebuild -scheme SwiftMCP -destination 'generic/platform=iOS' build

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build (Linux)
        run: swift build --build-tests -v
      - name: Test (Linux)
        run: swift test -v --skip-build

  # Windows runs in two parts within a single job:
  #
  # 1. Real, enforced (no `continue-on-error`): the NIO-free configuration
  #    (`Server` trait off, so no swift-nio in the graph — the server demo CLIs
  #    are gated `#if Server` and compile to a no-op stub) builds AND tests on
  #    Windows today. If swift-nio ever leaks back into the core/client, or a
  #    non-server test regresses on Windows, these steps fail the job.
  #
  # 2. Aspirational (`continue-on-error`): the full, default-traits build pulls
  #    swift-nio (NIOPosix), which does not currently compile on Windows
  #    (IPPROTO / Sendable errors in System.swift, Thread.swift,
  #    ThreadWindows.swift — an upstream issue, not in SwiftMCP). These steps
  #    stay visible without failing the job; drop the two `continue-on-error`
  #    flags once swift-nio builds on Windows. See
  #    https://github.com/apple/swift-nio.
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Build SwiftMCP library — Client trait only (no swift-nio)
        run: swift build --target SwiftMCP --traits Client
      - name: Test — non-server suite (Client + OpenAPI, no swift-nio)
        run: swift test --traits "Client,OpenAPI"
      - name: Build — full (default traits, with swift-nio)
        run: swift build --build-tests -v
        continue-on-error: true
      - name: Test — full (default traits)
        run: swift test -v --skip-build
        continue-on-error: true

  # Trait matrix: the tool/schema core and the `Client` feature must build
  # WITHOUT the `Server` trait, i.e. without swift-nio / swift-crypto /
  # swift-certificates. This keeps the NIO-free configuration green so a
  # client/tools-only consumer (and Windows, below) never regresses. The whole
  # package builds NIO-free too — the server demo CLIs are gated `#if Server`
  # and compile to a no-op stub — so a plain `swift build`/`swift test` with
  # `Server` disabled works, not just `--target SwiftMCP`.
  build-traits:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build SwiftMCP library — core only (all traits disabled)
        run: swift build --target SwiftMCP --disable-default-traits
      - name: Build SwiftMCP library — Client trait only (no swift-nio)
        run: swift build --target SwiftMCP --traits Client
      - name: Build whole package — Client + OpenAPI (no swift-nio)
        run: swift build --traits "Client,OpenAPI"
      - name: Test — non-server suite (Client + OpenAPI, no swift-nio)
        run: swift test --traits "Client,OpenAPI"

  # A normal Android run (build + emulator boot + test) finishes in ~8 min. But
  # when a test FAILS, swift-android-action's emulator teardown can hang
  # (`adb emu kill` → "stop: Not implemented"), so a fast test failure would
  # otherwise run out the whole job timeout and report as a confusing
  # "cancelled". Bound the action with a step-level timeout so a failure (or a
  # hung teardown) surfaces as a red check in ~25 min, and keep the job timeout
  # just above it.
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Build & test (Android emulator)
        timeout-minutes: 25
        uses: skiptools/swift-android-action@v2
        with:
          swift-version: "6.3.2"
          free-disk-space: true
