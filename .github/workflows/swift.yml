---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build (macOS)
        run: swift build --build-tests -v
      - name: Test (macOS)
        run: swift test -v --skip-build

  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build (iOS)
        run: xcodebuild -scheme SwiftMCP -destination 'generic/platform=iOS' build

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Swift version
        run: swift --version
      
      - name: Build & Test (Linux)
        run: swift test
